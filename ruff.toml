target-version = "py312"
line-length = 100

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
]
ignore = [
  "E501",  # line too long (handled by formatter)
  "B008",  # do not perform function calls in default arguments (common in FastAPI)
]

[format]
quote-style = "double"
indent-style = "space"
